name: Update PricePerToken Data

on:
  schedule:
    - cron: "0 6 * * *"   # Daily at 06:00 UTC
  workflow_dispatch:       # Manual trigger via GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Fetch pricing data
        run: ruby bin/fetch_pricepertoken

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pricepertoken.json
          if git diff --staged --quiet; then
            echo "data/pricepertoken.json is up to date, nothing to commit"
          else
            git commit -m "chore: update pricepertoken.json $(date -u +%Y-%m-%d)"
            git push
          fi
